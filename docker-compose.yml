services:
  portal:
    build: .
    container_name: faiba-captive-portal
    restart: unless-stopped
    env_file: .env
    ports:
      - "8480:8480"
    environment:
      - PORTAL_PORT=8480
      - GUNICORN_WORKERS=4
    volumes:
      - portal_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8480/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  portal_data:
