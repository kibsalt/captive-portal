version: '3.8'

services:
  portal:
    build: .
    container_name: faiba-captive-portal
    restart: unless-stopped
    env_file: .env
    volumes:
      - portal_data:/app/data
    expose:
      - "5000"
    networks:
      - portal_net

  nginx:
    image: nginx:alpine
    container_name: faiba-portal-nginx
    restart: unless-stopped
    ports:
      - "192.168.14.4:8280:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - portal
    networks:
      - portal_net

volumes:
  portal_data:

networks:
  portal_net:
    driver: bridge
