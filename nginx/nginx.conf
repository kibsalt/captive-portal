worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=portal:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;

    upstream flask {
        server portal:5000;
    }

    server {
        listen 80;
        server_name _;

        # Max upload size
        client_max_body_size 1m;

        # --- Captive Portal Detection Endpoints ---
        # These must respond quickly to trigger the CNA sign-in sheet

        # Apple iOS / macOS
        location /hotspot-detect.html {
            limit_req zone=portal burst=5 nodelay;
            proxy_pass http://flask;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Android
        location /generate_204 {
            limit_req zone=portal burst=5 nodelay;
            proxy_pass http://flask;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Windows NCSI
        location /connecttest.txt {
            limit_req zone=portal burst=5 nodelay;
            proxy_pass http://flask;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Firefox
        location /redirect {
            proxy_pass http://flask;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /success.txt {
            proxy_pass http://flask;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Chrome
        location /canonical.html {
            proxy_pass http://flask;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- Static files ---
        location /static/ {
            proxy_pass http://flask;
            proxy_set_header Host $host;
            expires 1h;
            add_header Cache-Control "public, immutable";
        }

        # --- API endpoints ---
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://flask;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Content-Type $content_type;
        }

        # --- M-Pesa callback (no rate limit) ---
        location /api/payment/mpesa/callback {
            proxy_pass http://flask;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- Main portal page ---
        location / {
            limit_req zone=portal burst=20 nodelay;
            proxy_pass http://flask;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- Health check ---
        location /health {
            proxy_pass http://flask;
            proxy_set_header Host $host;
        }
    }
}
